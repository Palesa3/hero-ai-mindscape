name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # NOTE: This is a TanStack Start app. GitHub Pages can only serve static
      # files, so we build in static/prerender mode. GITHUB_PAGES_BASE makes
      # asset URLs resolve under https://<user>.github.io/<repo>/.
      # If your repo is served from a user/org root or custom domain, set this to "/".
      - name: Build (static for Pages)
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: bun run build

      # The static client assets produced by the build. For a Cloudflare/nitro
      # build these live in .output/public. Adjust if your preset differs.
      - name: Prepare static output
        run: |
          if [ -d ".output/public" ]; then
            cp -r .output/public ./_site
          elif [ -d "dist" ]; then
            cp -r dist ./_site
          else
            echo "No static output found (.output/public or dist)." >&2
            exit 1
          fi
          # SPA fallback so client-side routes don't 404 on refresh.
          cp ./_site/index.html ./_site/404.html 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4